- name: configuring mysql
  hosts: mysql
  become: yes
  tasks: 
  - name: copy rabbitmq repo
    copy:
      src: rabbitmq.repo
      dest: /etc/yum.repos.d/rabbitmq.repo
  - name: install rabbitmq
    package:
      name: rabbitmq-server
      state: present
  - name: start and enable rabbitmq-server
    service:
      name: rabbitmq-server
      state: started
      enabled: yes
  - name: created user and password rabbitmq
    community.rabbitmq.rabbitmq_user:
      user: roboshop
      password: roboshop123
      permissions:
        - vhost: /
          configure_priv: .*
          read_priv: .*
          write_priv: .*
      state: present
