- name: Roboshop EC2 Instance Creation
  hosts: local
  connection: local
  vars:
    instance: ["redis", "mysql", "rabbitmq", "catalogue", "users", "cart", "shipping", "payment", "frontend"]
    ami_id: ami-0220d79f3f480ecf5
    instance_type: "t3.micro"
    domain_name: learndevopskills.shop
    action: create
  tasks:
  - name: Installing roboshop instances
    amazon.aws.ec2_instance:
      name: "roboshop-{{ item }}"
      instance_type: "{{ instance_type }}"
      image_id: "{{ ami_id }}"
      security_groups:
      - "roboshop-{{ item }}"
      - roboshop-common
    loop: "{{ instance }}"
    register: ec2_output
    when: action == "create"
  
  # - name:
  #   debug:
  #     msg: "{{ ec2_output }}"

  # - name: Create R53 Record
  #   debug:
  #     msg: " Instance Name: {{ item.item }} Private IP: {{ item.instances[0].private_ip_address }}"
  #   loop: "{{ ec2_output.results}}"

  - name: Add or create a R53 Record for frontend
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{item.item}}.{{domain_name}}"
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      overwrite: true
    loop: "{{ ec2_output.results }}"
    when: action == "create"

  - name: Add or create a R53 Record for frontend
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{domain_name}}"
      type: A
      ttl: 1
      value: "{{ item.instances[0].public_ip_address }}"
      overwrite: true
    loop: "{{ ec2_output.results }}"
    when: 
    - item.item == "frontend"
    - action == "create"

  - name: Delete a instance
    amazon.aws.route53:
      state: absent
      zone: "{{ domain_name }}"
      record: "{{item}}.{{domain_name}}"
      type: A
      ttl: 1
    loop: "{{ instance }}"
    when: action == "delete"

  - name: Delete a instance for frontend
    amazon.aws.route53:
      state: absent
      zone: "{{ domain_name }}"
      record: "{{domain_name}}"
      type: A
      ttl: 1
    loop: "{{ instance }}"
    when:
    - action == "delete"
    - item == "frontend"
  
  - name: delete ec2 instance
    amazon.aws.ec2_instance:
      state: absent
      name: "roboshop-{{item}}"

    loop: "{{ instance }}"
    when:
    - action == "delete"


  
