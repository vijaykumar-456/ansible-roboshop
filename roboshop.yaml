- name: Roboshop EC2 Instance Creation
  hosts: local
  connection: local
  vars:
    instance: ["mongodb", "redis", "frontend"]
    ami_id: ami-0220d79f3f480ecf5
    instance_type: "t3.micro"
    domain_name: learndevopskills.shop
  tasks:
  - name: Installing roboshop instances
    amazon.aws.ec2_instance:
      name: "roboshop-{{ item }}"
      instance_type: "{{ instance_type }}"
      image_id: "{{ ami_id }}"
      security_groups:
      - "roboshop-{{ item }}"
      - roboshop-common
    loop: "{{ instance }}"
    register: ec2_output
  
  # - name:
  #   debug:
  #     msg: "{{ ec2_output }}"

  # - name: Create R53 Record
  #   debug:
  #     msg: " Instance Name: {{ item.item }} Private IP: {{ item.instances[0].private_ip_address }}"
  #   loop: "{{ ec2_output.results}}"

  - name: Add or create a R53 Record for frontend
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{item}}.{{domain_name}}"
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      overwrite: true
    loop: "{{ ec2_output.results }}"

  - name: Add or create a R53 Record for frontend
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{domain_name}}"
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      overwrite: true
    loop: "{{ ec2_output.results }}"
    when: item.item == "frontend"
  
