- name: configure payment server
  hosts: payment
  become: yes
  tasks:
  - name: install python package
    package:
      name: "{{item}}"
      state: present
    loop:
    - python3
    - gcc
    - python3-devel
  - name: create roboshop system user
    user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "Roboshop system user"
  - name: Remove directory
    file:
      path: /app
      state: absent
  - name: delete payment.zip in thmp directory
    file:
      path: /tmp/payment.zip
      state: absent
  - name: create app directory
    file:
      path: /app
      state: directory
  - name: download payment
    get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip
      dest: /tmp/payment.zip
  - name: unzip payment
    unarchive:
      src: /tmp/payment.zip
      dest: /app
      remote_src: yes
  - name: install dependencies
    pip:
      requirements: requirements.txt
      executable: pip3.9
    args:
      chdir: /app
  - name: payment service
    service:
      src: payment.service.j2
      dest: /etc/systemd/system/payment.service
  - name: deamon reload
    systemd_service:
      name: payment
      daemon_reload: true
  - name: enable and start the service
    service: 
      name: payment
      state: restarted
      enabled: yes